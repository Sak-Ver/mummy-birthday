<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Mummy ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
        }

        h1 {
            margin-top: 40px;
            font-size: 42px;
        }

        img {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 8px solid white;
            margin-top: 20px;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(255,255,255,0.8);
        }

        p {
            font-size: 20px;
            width: 85%;
            margin: 20px auto;
            line-height: 1.6;
        }

        button {
            padding: 14px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #ff4b7d;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4b7d;
            color: white;
        }
    </style>
</head>
<body>

    <h1>🎉 Happy Birthday Mummy 🎂</h1>

    <img src="mummy.jpg" alt="Mummy Photo">

    <p>
        Aap meri strength ho, meri duniya ho ❤️  
        Aaj ka din sirf aapke naam hai.
    </p>

    <button onclick="goToSurprise()">Click For Special Surprise 🎁</button>

    <script>
        function goToSurprise() {
            window.location.href = "surprise.html";
        }
    </script>

</body>
</html>
