<!DOCTYPE html>
<html>
<head>
    <title>Special Surprise ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
            background: linear-gradient(-45deg, #ff6a88, #ff99ac, #ff758c, #ff7eb3);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            margin-top: 100px;
            font-size: 42px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px white; }
            to { text-shadow: 0 0 30px yellow; }
        }

        p {
            font-size: 22px;
            width: 85%;
            margin: 30px auto;
            line-height: 1.8;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 25px;
            border: none;
            background: white;
            color: #ff4b7d;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4b7d;
            color: white;
        }

        .heart {
            position: fixed;
            color: red;
            font-size: 20px;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>Mummy ❤️</h1>

    <p>
        Main duniya ka sabse lucky beta hoon  
        kyunki mujhe aap jaisi mummy mili 💖  
        Aapka pyaar meri sabse badi taqat hai.  
        Main hamesha aapko proud feel karwaunga.  
        I Love You Forever ❤️
    </p>

    <button onclick="goBack()">Go Back 🎂</button>

    <script>
        function goBack() {
            window.location.href = "bith.html";
        }

        // Floating hearts
        setInterval(() => {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 15) + "px";
            heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }, 300);
    </script>

</body>
</html>
